<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Lock body rectangle -->
  <rect x="16" y="50" width="68" height="46" rx="3"
        stroke="#1e3a8a" stroke-width="3.5"/>

  <!-- 6 grid squares: 3 columns × 2 rows -->
  <rect x="22.5" y="56.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>
  <rect x="42"   y="56.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>
  <rect x="61.5" y="56.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>
  <rect x="22.5" y="71.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>
  <rect x="42"   y="71.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>
  <rect x="61.5" y="71.5" width="16" height="11" rx="2" stroke="#1e3a8a" stroke-width="2.5"/>

  <!-- Shackle outer arch -->
  <path d="M 16 65 L 16 40 C 16 8 84 8 84 40 L 84 65"
        stroke="#1e3a8a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Shackle middle arch -->
  <path d="M 24 65 L 24 42 C 24 17 76 17 76 42 L 76 65"
        stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>

  <!-- Shackle inner arch — lightbulb silhouette:
       legs go straight up, then neck narrows, then wide dome -->
  <path d="M 32 65
           L 32 55
           C 32 47, 34 44, 50 27
           C 66 44, 68 47, 68 55
           L 68 65"
        stroke="#1e3a8a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

</svg>